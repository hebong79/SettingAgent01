<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SettingViewer</title>
    <link rel="stylesheet" href="./app.css" />
  </head>
  <body>
    <header class="topbar">
      <nav class="tabs">
        <button class="tab active" data-tab="control">제어·모니터링</button>
        <button class="tab" data-tab="inspect">주차면 검수</button>
        <button class="tab" data-tab="precise">정밀 수집</button>
      </nav>
      <div class="badges">
        <span id="badge-backend" class="badge">● backend</span>
        <span id="badge-camera" class="badge">● camera</span>
      </div>
    </header>

    <main class="layout">
      <section class="viewport-wrap">
        <div class="viewport">
          <img id="frame" alt="camera frame" />
          <canvas id="overlay"></canvas>
        </div>
        <div class="stream-controls">
          <button id="btn-start">시작</button>
          <button id="btn-stop">정지</button>
          fps <input id="fps" type="number" min="1" max="10" value="3" />
          <label><input id="roi-vehicle" type="checkbox" checked /> 차량</label>
          <label><input id="roi-plate" type="checkbox" checked /> 번호판</label>
        </div>
      </section>

      <aside class="panel">
        <div class="ptz-now">현재 PTZ
          <span>P <b id="ptz-pan">-</b></span>
          <span>T <b id="ptz-tilt">-</b></span>
          <span>Z <b id="ptz-zoom">-</b></span>
        </div>
        <hr />
        <div class="select-row">
          소스 <select id="sel-source"></select>
        </div>
        <div class="select-row">
          카메라 <select id="sel-cam"></select>
          프리셋 <select id="sel-preset"></select>
          <button id="btn-goto">이동</button>
        </div>
        <div class="select-row">
          모드
          <label><input type="radio" name="mode" value="preset" checked /> 프리셋 보기</label>
          <label><input type="radio" name="mode" value="manual" /> 수동 제어</label>
        </div>
        <hr />
        <div class="ptz-pad">
          <div class="pad-grid">
            <button data-dir="up">▲</button>
            <button data-dir="left">◄</button>
            <button data-dir="right">►</button>
            <button data-dir="down">▼</button>
          </div>
          <div class="zoom-col">
            <button data-dir="zoomIn">+ zoom</button>
            <button data-dir="zoomOut">− zoom</button>
            step <input id="step" type="number" value="500" />
          </div>
        </div>
        <div class="abs-row">
          절대 이동
          pan <input id="abs-pan" type="number" />
          tilt <input id="abs-tilt" type="number" />
          zoom <input id="abs-zoom" type="number" />
          <button id="btn-abs">이동</button>
        </div>
        <hr />
        <div id="login-box" class="login-box" hidden>
          실카메라 로그인
          <input id="login-user" type="text" placeholder="user" autocomplete="off" />
          <input id="login-pass" type="password" placeholder="pass" autocomplete="off" />
          <button id="btn-login">로그인</button>
          <span id="login-status"></span>
        </div>
        <div id="slot-list" class="slot-list"></div>

        <!-- 정밀 수집(장기 관측·반복 수집) 패널. precise 탭에서 표시. -->
        <div id="precise-box" class="precise-box" hidden>
          <h3>정밀 수집</h3>
          <div class="select-row">
            반복 횟수 <input id="cap-count" type="number" min="1" value="50" />
          </div>
          <div class="select-row">
            주기(초) <input id="cap-interval" type="number" min="1" value="30" />
          </div>
          <div class="select-row">
            체크포인트 간격 <input id="cap-checkpoint" type="number" min="1" value="10" />
          </div>
          <div class="select-row">
            <button id="cap-start">시작</button>
            <button id="cap-stop">정지</button>
            <button id="cap-finalize">최종화</button>
          </div>
          <div class="cap-progress">
            <progress id="cap-bar" max="100" value="0"></progress>
            <span id="cap-label">idle 0/0 (0%)</span>
          </div>
          <div id="cap-advisory" class="cap-advisory"></div>
          <div id="cap-msg" class="cap-msg"></div>
        </div>
      </aside>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
